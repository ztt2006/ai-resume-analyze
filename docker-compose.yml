version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-resume-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_resume_analyze}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_resume_analyze}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-resume-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-123456} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-resume-backend
    environment:
      APP_NAME: ${APP_NAME:-AI赋能智能简历分析系统}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      API_PREFIX: ${API_PREFIX:-/api}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-ai_resume_analyze}
      REDIS_URL: redis://:${REDIS_PASSWORD:-123456}@redis:6379/0
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-86400}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-45}
      AI_REQUEST_PATH: ${AI_REQUEST_PATH:-choices.0.message.content}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      RESUME_STORAGE_DIR: /app/storage/resumes
      SERVERLESS_STAGE: ${SERVERLESS_STAGE:-docker}
      DOCS_URL: ${DOCS_URL:-/docs}
      OPENAPI_URL: ${OPENAPI_URL:-/openapi.json}
      REDOC_URL: ${REDOC_URL:-/redoc}
    volumes:
      - resume_storage:/app/storage/resumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: ai-resume-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  resume_storage:
